id: background_translation_test
background:
  color: [80, 40, 120]
  alpha: 200
  scale: [6.0, 3.0, 1.0]
  text: " "
  translation: [0.0, 0.5, 0.0]  # Смещаем фон вверх

scripts:
  file: "background_translation_test.lua"

widgets:
  # Кнопка для демонстрации относительного позиционирования
  - id: btn_center
    type: ITEM_BUTTON
    material: GOLD_INGOT
    position: [0.0, 0.0, 0.0]
    scale: [0.8, 0.8, 0.02]
    translation: [0.0, 0.0, 0.0]
    tolerance: [0.1, 0.1]
    glowOnHover: true
    tooltip: "Центральная кнопка (без смещения)"
    onClick:
      action: NONE

  # Информационный текст
  - id: info_text
    type: TEXT_BUTTON
    text: "Фон смещен вверх на 0.5"
    position: [0.0, -0.8, 0.0]
    scale: [0.4, 0.4, 0.4]
    translation: [0.0, 0.0, 0.0]
    backgroundColor: [40, 60, 80]
    backgroundAlpha: 150
    tooltip: "Демонстрация translation для фона"
    onClick:
      action: NONE

  # Кнопка возврата
  - id: btn_back
    type: TEXT_BUTTON
    text: "← Назад"
    position: [-0.8, -0.8, 0.0]
    scale: [0.4, 0.4, 0.4]
    translation: [0.0, 0.0, 0.0]
    backgroundColor: [60, 40, 40]
    backgroundAlpha: 150
    hoveredBackgroundColor: [80, 50, 50]
    hoveredBackgroundAlpha: 180
    onClick:
      action: SWITCH_SCREEN
      target: translation_test

  # Кнопка закрытия
  - id: btn_close
    type: TEXT_BUTTON
    text: "⏺"
    hoveredText: "Закрыть"
    position: [0.8, 0.8, 0.0]
    scale: [0.6, 0.6, 0.6]
    translation: [0.0, 0.0, 0.0]
    backgroundColor: [80, 20, 20]
    backgroundAlpha: 150
    hoveredBackgroundColor: [120, 30, 30]
    hoveredBackgroundAlpha: 180
    onClick:
      action: CLOSE_SCREEN