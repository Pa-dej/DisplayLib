id: background_position_test
background:
  color: [0, 100, 200]
  alpha: 180
  scale: [6, 3, 1]
  position: [-0.5, 0.3, 0]  # Смещаем фон влево и вверх
  text: " "
  translation: [0, 0, 0]

scripts:
  file: "background_position_test.lua"

widgets:
  # Центральная кнопка для ориентира
  - id: btn_center
    type: ITEM_BUTTON
    material: EMERALD
    position: [0.0, 0.0, 0.0]
    scale: [0.6, 0.6, 0.02]
    translation: [0.0, 0.0, 0.0]
    tolerance: [0.08, 0.08]
    glowOnHover: true
    tooltip: "Центр экрана (0, 0, 0)"
    onClick:
      action: NONE

  # Кнопка на позиции фона для сравнения
  - id: btn_background_pos
    type: ITEM_BUTTON
    material: DIAMOND
    position: [-0.5, 0.3, 0.0]  # Та же позиция, что у фона
    scale: [0.4, 0.4, 0.02]
    translation: [0.0, 0.0, 0.0]
    tolerance: [0.06, 0.06]
    glowOnHover: true
    tooltip: "Позиция фона (-0.5, 0.3, 0)"
    onClick:
      action: NONE

  # Информационный текст
  - id: info_text
    type: TEXT_BUTTON
    text: "Фон смещен на position: [-0.5, 0.3, 0]"
    position: [0.0, -0.6, 0.0]
    scale: [0.35, 0.35, 0.35]
    translation: [0.0, 0.0, 0.0]
    backgroundColor: [40, 60, 80]
    backgroundAlpha: 150
    tooltip: "Демонстрация position для фона"
    onClick:
      action: NONE

  # Дополнительный фон (второй виджет как фон)
  - id: second_background
    type: TEXT_BUTTON
    text: " "
    position: [0.5, -0.3, 0.0]
    scale: [4.0, 2.0, 1.0]
    translation: [0.0, 0.0, 0.0]
    backgroundColor: [200, 100, 0]
    backgroundAlpha: 120
    tooltip: "Дополнительный фон-виджет"
    onClick:
      action: NONE

  # Кнопка возврата
  - id: btn_back
    type: TEXT_BUTTON
    text: "← Назад"
    position: [-0.8, -0.8, 0.0]
    scale: [0.4, 0.4, 0.4]
    translation: [0.0, 0.0, 0.0]
    backgroundColor: [60, 40, 40]
    backgroundAlpha: 150
    hoveredBackgroundColor: [80, 50, 50]
    hoveredBackgroundAlpha: 180
    onClick:
      action: SWITCH_SCREEN
      target: translation_test

  # Кнопка закрытия
  - id: btn_close
    type: TEXT_BUTTON
    text: "⏺"
    hoveredText: "Закрыть"
    position: [0.8, 0.8, 0.0]
    scale: [0.6, 0.6, 0.6]
    translation: [0.0, 0.0, 0.0]
    backgroundColor: [80, 20, 20]
    backgroundAlpha: 150
    hoveredBackgroundColor: [120, 30, 30]
    hoveredBackgroundAlpha: 180
    onClick:
      action: CLOSE_SCREEN