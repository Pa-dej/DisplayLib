id: magic_number_test
background:
  color: [50, 100, 150]
  alpha: 180
  scale: [6, 3, 1]
  position: [0, 0, 0]
  translation: [-0.075, 0, 0]  # -6/80 = -0.075
  text: " "

scripts:
  file: "magic_number_test.lua"

widgets:
  # Тест разных размеров фона
  - id: info_text
    type: TEXT_BUTTON
    text: "Тест магического числа: -scale_x/80"
    position: [0, 1.0, 0]
    scale: [0.4, 0.4, 0.4]
    translation: [0, 0, 0]
    backgroundColor: [60, 80, 120]
    backgroundAlpha: 200
    onClick:
      action: NONE

  # Кнопки для переключения размеров
  - id: btn_size_8_4
    type: TEXT_BUTTON
    text: "8×4 (-0.1)"
    position: [-0.6, 0.3, 0]
    scale: [0.35, 0.35, 0.35]
    translation: [0, 0, 0]
    backgroundColor: [80, 40, 40]
    backgroundAlpha: 150
    hoveredBackgroundColor: [100, 50, 50]
    hoveredBackgroundAlpha: 180
    tooltip: "scale: [8, 4, 1], translation: [-0.1, 0, 0]"
    onClick:
      action: SWITCH_SCREEN
      target: test_8_4

  - id: btn_size_6_3
    type: TEXT_BUTTON
    text: "6×3 (-0.075)"
    position: [0, 0.3, 0]
    scale: [0.35, 0.35, 0.35]
    translation: [0, 0, 0]
    backgroundColor: [40, 80, 40]
    backgroundAlpha: 150
    hoveredBackgroundColor: [50, 100, 50]
    hoveredBackgroundAlpha: 180
    tooltip: "scale: [6, 3, 1], translation: [-0.075, 0, 0]"
    onClick:
      action: NONE

  - id: btn_size_2_1
    type: TEXT_BUTTON
    text: "2×1 (-0.025)"
    position: [0.6, 0.3, 0]
    scale: [0.35, 0.35, 0.35]
    translation: [0, 0, 0]
    backgroundColor: [40, 40, 80]
    backgroundAlpha: 150
    hoveredBackgroundColor: [50, 50, 100]
    hoveredBackgroundAlpha: 180
    tooltip: "scale: [2, 1, 1], translation: [-0.025, 0, 0]"
    onClick:
      action: SWITCH_SCREEN
      target: test_2_1

  # Формула
  - id: formula_text
    type: TEXT_BUTTON
    text: "Формула: translation_x = -scale_x / 80"
    position: [0, -0.3, 0]
    scale: [0.35, 0.35, 0.35]
    translation: [0, 0, 0]
    backgroundColor: [100, 60, 100]
    backgroundAlpha: 150
    onClick:
      action: NONE

  # Кнопка возврата
  - id: btn_back
    type: TEXT_BUTTON
    text: "← Назад"
    position: [-0.8, -0.8, 0]
    scale: [0.4, 0.4, 0.4]
    translation: [0, 0, 0]
    backgroundColor: [60, 40, 40]
    backgroundAlpha: 150
    hoveredBackgroundColor: [80, 50, 50]
    hoveredBackgroundAlpha: 180
    onClick:
      action: SWITCH_SCREEN
      target: translation_test

  # Кнопка закрытия
  - id: btn_close
    type: TEXT_BUTTON
    text: "⏺"
    hoveredText: "Закрыть"
    position: [0.8, 0.8, 0]
    scale: [0.6, 0.6, 0.6]
    translation: [0, 0, 0]
    backgroundColor: [80, 20, 20]
    backgroundAlpha: 150
    hoveredBackgroundColor: [120, 30, 30]
    hoveredBackgroundAlpha: 180
    onClick:
      action: CLOSE_SCREEN