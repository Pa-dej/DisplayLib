# Демонстрация системы анимации hover
# Показывает различные типы анимаций при наведении курсора

id: "hover_animation_demo"
screen_type: PRIVATE
tick_rate: 4
interaction_radius: 8.0
close_distance: 15.0

background:
  color: [25, 25, 35]
  alpha: 220
  scale: [18.0, 12.0, 1.0]
  text: "▓"

scripts:
  file: "hover_animation_demo.lua"

widgets:
  # Заголовок
  - id: "title"
    type: TEXT_BUTTON
    text: "🎭 Демонстрация Hover Анимаций"
    position: [0.0, 4.5, 0.0]
    scale: [0.4, 0.4, 0.4]
    tolerance: [0.0, 0.0]
    backgroundColor: [0, 0, 0]
    backgroundAlpha: 0
    alignment: CENTERED

  # === ПРОСТЫЕ ПРЕДУСТАНОВКИ ===
  
  # Bounce эффект
  - id: "bounce_btn"
    type: TEXT_BUTTON
    text: "🏀 Bounce"
    position: [-6.0, 3.0, 0.0]
    scale: [0.2, 0.2, 0.2]
    backgroundColor: [70, 130, 180]
    backgroundAlpha: 180
    hoveredBackgroundColor: [100, 149, 237]
    hoveredBackgroundAlpha: 220
    tooltip: "Эффект подпрыгивания"
    hoverAnimation:
      type: PRESET
      preset: BOUNCE
      duration: 8
      intensity: 1.15
      easing: BOUNCE
    onClick:
      action: RUN_SCRIPT
      function: "onBounceClick"

  # Scale эффект
  - id: "scale_btn"
    type: TEXT_BUTTON
    text: "📏 Scale"
    position: [-3.0, 3.0, 0.0]
    scale: [0.2, 0.2, 0.2]
    backgroundColor: [180, 70, 130]
    backgroundAlpha: 180
    hoveredBackgroundColor: [237, 100, 149]
    hoveredBackgroundAlpha: 220
    tooltip: "Плавное увеличение"
    hoverAnimation:
      type: PRESET
      preset: SCALE
      duration: 6
      intensity: 1.25
      easing: EASE_OUT
    onClick:
      action: RUN_SCRIPT
      function: "onScaleClick"

  # Lift эффект
  - id: "lift_btn"
    type: TEXT_BUTTON
    text: "⬆️ Lift"
    position: [0.0, 3.0, 0.0]
    scale: [0.2, 0.2, 0.2]
    backgroundColor: [130, 180, 70]
    backgroundAlpha: 180
    hoveredBackgroundColor: [149, 237, 100]
    hoveredBackgroundAlpha: 220
    tooltip: "Поднятие вверх"
    hoverAnimation:
      type: PRESET
      preset: LIFT
      duration: 8
      intensity: 1.5
      easing: EASE_IN_OUT
    onClick:
      action: RUN_SCRIPT
      function: "onLiftClick"

  # Pulse эффект
  - id: "pulse_btn"
    type: TEXT_BUTTON
    text: "💓 Pulse"
    position: [3.0, 3.0, 0.0]
    scale: [0.2, 0.2, 0.2]
    backgroundColor: [180, 130, 70]
    backgroundAlpha: 180
    hoveredBackgroundColor: [237, 149, 100]
    hoveredBackgroundAlpha: 220
    tooltip: "Эффект пульсации"
    hoverAnimation:
      type: PRESET
      preset: PULSE
      duration: 12
      intensity: 1.3
      easing: EASE_IN_OUT
    onClick:
      action: RUN_SCRIPT
      function: "onPulseClick"

  # Spin эффект
  - id: "spin_btn"
    type: TEXT_BUTTON
    text: "🔄 Spin"
    position: [6.0, 3.0, 0.0]
    scale: [0.2, 0.2, 0.2]
    backgroundColor: [130, 70, 180]
    backgroundAlpha: 180
    hoveredBackgroundColor: [149, 100, 237]
    hoveredBackgroundAlpha: 220
    tooltip: "Поворот"
    hoverAnimation:
      type: PRESET
      preset: SPIN
      duration: 10
      intensity: 1.0
      easing: ELASTIC
    onClick:
      action: RUN_SCRIPT
      function: "onSpinClick"

  # === НАСТРАИВАЕМЫЕ АНИМАЦИИ ===

  # Подзаголовок
  - id: "custom_title"
    type: TEXT_BUTTON
    text: "Настраиваемые анимации:"
    position: [0.0, 1.5, 0.0]
    scale: [0.25, 0.25, 0.25]
    tolerance: [0.0, 0.0]
    backgroundColor: [0, 0, 0]
    backgroundAlpha: 0
    alignment: CENTERED

  # Настраиваемый Scale
  - id: "custom_scale_btn"
    type: TEXT_BUTTON
    text: "📐 Custom Scale"
    position: [-4.5, 0.5, 0.0]
    scale: [0.18, 0.18, 0.18]
    backgroundColor: [100, 50, 150]
    backgroundAlpha: 180
    hoveredBackgroundColor: [130, 70, 180]
    hoveredBackgroundAlpha: 220
    tooltip: "Растягивание по X больше чем по Y"
    hoverAnimation:
      type: SCALE
      duration: 10
      scale: [1.4, 1.1, 1.0]
      easing: EASE_OUT
      reverseOnExit: true
    onClick:
      action: RUN_SCRIPT
      function: "onCustomScaleClick"

  # Translate анимация
  - id: "translate_btn"
    type: TEXT_BUTTON
    text: "➡️ Translate"
    position: [-1.5, 0.5, 0.0]
    scale: [0.18, 0.18, 0.18]
    backgroundColor: [150, 100, 50]
    backgroundAlpha: 180
    hoveredBackgroundColor: [180, 130, 70]
    hoveredBackgroundAlpha: 220
    tooltip: "Смещение вправо и вверх"
    hoverAnimation:
      type: TRANSLATE
      duration: 8
      offset: [0.05, 0.03, 0.0]
      easing: EASE_IN_OUT
    onClick:
      action: RUN_SCRIPT
      function: "onTranslateClick"

  # Rotate анимация
  - id: "rotate_btn"
    type: TEXT_BUTTON
    text: "🔄 Rotate"
    position: [1.5, 0.5, 0.0]
    scale: [0.18, 0.18, 0.18]
    backgroundColor: [50, 150, 100]
    backgroundAlpha: 180
    hoveredBackgroundColor: [70, 180, 130]
    hoveredBackgroundAlpha: 220
    tooltip: "Поворот на 25 градусов"
    hoverAnimation:
      type: ROTATE
      duration: 12
      rotation: [0, 25, 0]
      axis: [0, 1, 0]
      easing: ELASTIC
    onClick:
      action: RUN_SCRIPT
      function: "onRotateClick"

  # Комбинированная анимация
  - id: "combined_btn"
    type: TEXT_BUTTON
    text: "🎭 Combined"
    position: [4.5, 0.5, 0.0]
    scale: [0.18, 0.18, 0.18]
    backgroundColor: [150, 50, 100]
    backgroundAlpha: 180
    hoveredBackgroundColor: [180, 70, 130]
    hoveredBackgroundAlpha: 220
    tooltip: "Комбинация: увеличение + подъем + поворот"
    hoverAnimation:
      type: COMBINED
      duration: 10
      effects:
        - type: SCALE
          scale: [1.15, 1.15, 1.0]
        - type: TRANSLATE
          offset: [0.0, 0.025, 0.0]
        - type: ROTATE
          rotation: [0, 15, 0]
          axis: [0, 1, 0]
    onClick:
      action: RUN_SCRIPT
      function: "onCombinedClick"

  # === ПРЕДМЕТЫ С АНИМАЦИЕЙ ===

  # Подзаголовок для предметов
  - id: "items_title"
    type: TEXT_BUTTON
    text: "Предметы с анимацией:"
    position: [0.0, -1.0, 0.0]
    scale: [0.25, 0.25, 0.25]
    tolerance: [0.0, 0.0]
    backgroundColor: [0, 0, 0]
    backgroundAlpha: 0
    alignment: CENTERED

  # Алмазный меч с bounce
  - id: "animated_sword"
    type: ITEM_BUTTON
    material: DIAMOND_SWORD
    position: [-3.0, -2.0, 0.0]
    scale: [0.25, 0.25, 0.25]
    glowOnHover: true
    glowColor: [0, 255, 255]
    tooltip: "Алмазный меч с bounce эффектом"
    hoverAnimation:
      type: SCALE
      duration: 6
      scale: [1.3, 1.3, 1.0]
      easing: BOUNCE
    onClick:
      action: RUN_SCRIPT
      function: "onSwordClick"

  # Изумруд с вращением
  - id: "spinning_gem"
    type: ITEM_BUTTON
    material: EMERALD
    position: [0.0, -2.0, 0.0]
    scale: [0.25, 0.25, 0.25]
    glowOnHover: true
    glowColor: [0, 255, 0]
    tooltip: "Изумруд с постоянным вращением"
    hoverAnimation:
      type: ROTATE
      duration: 20
      rotation: [0, 45, 0]
      axis: [0, 1, 0]
      easing: LINEAR
      loop: true
    onClick:
      action: RUN_SCRIPT
      function: "onGemClick"

  # Зелье с левитацией
  - id: "floating_potion"
    type: ITEM_BUTTON
    material: POTION
    position: [3.0, -2.0, 0.0]
    scale: [0.25, 0.25, 0.25]
    glowOnHover: true
    glowColor: [255, 0, 255]
    tooltip: "Зелье с эффектом левитации"
    hoverAnimation:
      type: TRANSLATE
      duration: 15
      offset: [0.0, 0.05, 0.0]
      easing: EASE_IN_OUT
      loop: true
      loopCount: 3
    onClick:
      action: RUN_SCRIPT
      function: "onPotionClick"

  # === ДЕМОНСТРАЦИЯ EASING ===

  # Подзаголовок для easing
  - id: "easing_title"
    type: TEXT_BUTTON
    text: "Типы плавности (Easing):"
    position: [0.0, -3.5, 0.0]
    scale: [0.25, 0.25, 0.25]
    tolerance: [0.0, 0.0]
    backgroundColor: [0, 0, 0]
    backgroundAlpha: 0
    alignment: CENTERED

  # LINEAR
  - id: "linear_btn"
    type: TEXT_BUTTON
    text: "LINEAR"
    position: [-6.0, -4.5, 0.0]
    scale: [0.12, 0.12, 0.12]
    backgroundColor: [70, 70, 70]
    backgroundAlpha: 180
    tooltip: "Равномерная скорость"
    hoverAnimation:
      type: SCALE
      duration: 15
      scale: [1.4, 1.4, 1.0]
      easing: LINEAR

  # EASE_IN
  - id: "ease_in_btn"
    type: TEXT_BUTTON
    text: "EASE_IN"
    position: [-3.6, -4.5, 0.0]
    scale: [0.12, 0.12, 0.12]
    backgroundColor: [100, 70, 70]
    backgroundAlpha: 180
    tooltip: "Медленный старт"
    hoverAnimation:
      type: SCALE
      duration: 15
      scale: [1.4, 1.4, 1.0]
      easing: EASE_IN

  # EASE_OUT
  - id: "ease_out_btn"
    type: TEXT_BUTTON
    text: "EASE_OUT"
    position: [-1.2, -4.5, 0.0]
    scale: [0.12, 0.12, 0.12]
    backgroundColor: [70, 100, 70]
    backgroundAlpha: 180
    tooltip: "Медленный финиш"
    hoverAnimation:
      type: SCALE
      duration: 15
      scale: [1.4, 1.4, 1.0]
      easing: EASE_OUT

  # EASE_IN_OUT
  - id: "ease_in_out_btn"
    type: TEXT_BUTTON
    text: "EASE_IN_OUT"
    position: [1.2, -4.5, 0.0]
    scale: [0.12, 0.12, 0.12]
    backgroundColor: [70, 70, 100]
    backgroundAlpha: 180
    tooltip: "Медленный старт и финиш"
    hoverAnimation:
      type: SCALE
      duration: 15
      scale: [1.4, 1.4, 1.0]
      easing: EASE_IN_OUT

  # BOUNCE
  - id: "bounce_easing_btn"
    type: TEXT_BUTTON
    text: "BOUNCE"
    position: [3.6, -4.5, 0.0]
    scale: [0.12, 0.12, 0.12]
    backgroundColor: [100, 70, 100]
    backgroundAlpha: 180
    tooltip: "Эффект отскока"
    hoverAnimation:
      type: SCALE
      duration: 15
      scale: [1.4, 1.4, 1.0]
      easing: BOUNCE

  # ELASTIC
  - id: "elastic_btn"
    type: TEXT_BUTTON
    text: "ELASTIC"
    position: [6.0, -4.5, 0.0]
    scale: [0.12, 0.12, 0.12]
    backgroundColor: [100, 100, 70]
    backgroundAlpha: 180
    tooltip: "Эластичный эффект"
    hoverAnimation:
      type: SCALE
      duration: 20
      scale: [1.4, 1.4, 1.0]
      easing: ELASTIC

  # Кнопка возврата
  - id: "back_btn"
    type: TEXT_BUTTON
    text: "⬅ Назад"
    position: [0.0, -5.5, 0.0]
    scale: [0.2, 0.2, 0.2]
    backgroundColor: [100, 100, 100]
    backgroundAlpha: 180
    hoveredBackgroundColor: [130, 130, 130]
    hoveredBackgroundAlpha: 220
    hoverAnimation:
      type: PRESET
      preset: SCALE
      duration: 5
      intensity: 1.1
    onClick:
      action: SWITCH_SCREEN
      target: "main_menu"