id: simple_demo
background:
  color: [20, 30, 50]
  alpha: 180
  scale: [8.0, 5.0, 1.0]
  text: " "

scripts:
  file: "simple_demo.lua"

widgets:
  # Заголовок
  - id: title
    type: TEXT_BUTTON
    text: "Lua API Demo"
    hoveredText: "Демонстрация Lua API"
    position: [0.0, 0.85, 0.0]
    scale: [0.6, 0.6, 0.6]
    tolerance: [0.15, 0.08]
    backgroundColor: [60, 80, 120]
    backgroundAlpha: 200
    onClick:
      action: NONE

  # Кнопки в стиле старого плагина (левая колонка)
  - id: btn_heal
    type: ITEM_BUTTON
    material: GOLDEN_APPLE
    position: [-0.42, 0.3, 0.0]
    scale: [0.15, 0.15, 0.15]
    tolerance: [0.06, 0.06]
    tooltip: "Восстановить здоровье"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_heal_click"

  - id: btn_gamemode
    type: ITEM_BUTTON
    material: COMMAND_BLOCK
    position: [-0.42, 0.47, 0.0]
    scale: [0.15, 0.15, 0.15]
    tolerance: [0.06, 0.06]
    tooltip: "Переключить режим игры"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_gamemode_click"

  - id: btn_sound
    type: ITEM_BUTTON
    material: NOTE_BLOCK
    position: [-0.42, 0.64, 0.0]
    scale: [0.15, 0.15, 0.15]
    tolerance: [0.06, 0.06]
    tooltip: "Воспроизвести звук"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_sound_click"

  # Счетчик (центр)
  - id: counter_label
    type: TEXT_BUTTON
    text: "Счетчик: 0"
    hoveredText: "Счетчик: 0"
    position: [0.0, 0.3, 0.0]
    scale: [0.4, 0.4, 0.4]
    tolerance: [0.12, 0.06]
    backgroundColor: [40, 80, 40]
    backgroundAlpha: 150
    onClick:
      action: NONE

  - id: btn_increment
    type: ITEM_BUTTON
    material: GREEN_CONCRETE
    position: [-0.15, 0.1, 0.0]
    scale: [0.12, 0.12, 0.12]
    tolerance: [0.06, 0.06]
    tooltip: "Увеличить"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_increment_click"

  - id: btn_decrement
    type: ITEM_BUTTON
    material: RED_CONCRETE
    position: [0.15, 0.1, 0.0]
    scale: [0.12, 0.12, 0.12]
    tolerance: [0.06, 0.06]
    tooltip: "Уменьшить"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_decrement_click"

  # Демо текст (правая сторона)
  - id: demo_text
    type: TEXT_BUTTON
    text: "Изменяемый текст"
    hoveredText: "Изменяемый текст"
    position: [0.42, 0.3, 0.0]
    scale: [0.35, 0.35, 0.35]
    tolerance: [0.1, 0.05]
    backgroundColor: [80, 60, 120]
    backgroundAlpha: 180
    onClick:
      action: NONE

  - id: btn_change_text
    type: ITEM_BUTTON
    material: WRITABLE_BOOK
    position: [0.42, 0.47, 0.0]
    scale: [0.12, 0.12, 0.12]
    tolerance: [0.06, 0.06]
    tooltip: "Изменить текст"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_change_text_click"

  - id: btn_toggle_visibility
    type: ITEM_BUTTON
    material: ENDER_EYE
    position: [0.42, 0.64, 0.0]
    scale: [0.12, 0.12, 0.12]
    tolerance: [0.06, 0.06]
    tooltip: "Показать/скрыть"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_toggle_visibility_click"

  # Таймер демо (низ)
  - id: timer_status
    type: TEXT_BUTTON
    text: "Готов к запуску"
    hoveredText: "Статус таймера"
    position: [0.0, -0.1, 0.0]
    scale: [0.35, 0.35, 0.35]
    tolerance: [0.1, 0.05]
    backgroundColor: [80, 80, 60]
    backgroundAlpha: 150
    onClick:
      action: NONE

  - id: btn_timer
    type: ITEM_BUTTON
    material: CLOCK
    position: [0.0, -0.3, 0.0]
    scale: [0.12, 0.12, 0.12]
    tolerance: [0.06, 0.06]
    tooltip: "Запустить таймер"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_timer_click"

  # Кнопка закрытия (как в старом стиле)
  - id: btn_close
    type: TEXT_BUTTON
    text: "⏺"
    hoveredText: "Закрыть"
    position: [0.35, 0.8, 0.0]
    scale: [0.75, 0.75, 0.75]
    tolerance: [0.035, 0.035]
    backgroundAlpha: 0
    hoveredBackgroundAlpha: 50
    onClick:
      action: CLOSE_SCREEN