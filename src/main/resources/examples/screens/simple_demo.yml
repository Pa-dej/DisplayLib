id: simple_demo
background:
  color: [20, 30, 50]
  alpha: 180
  scale: [10.0, 7.0, 1.0]
  text: " "

scripts:
  file: "simple_demo.lua"

widgets:
  # Заголовок
  - id: title
    type: TEXT_BUTTON
    text: "Comprehensive Lua API Demo"
    hoveredText: "Полная демонстрация всех возможностей Lua API"
    position: [0.0, 1.2, 0.0]
    scale: [0.5, 0.5, 0.5]
    backgroundColor: [60, 80, 120]
    backgroundAlpha: 200
    onClick:
      action: NONE

  # ========== ЛЕВАЯ КОЛОНКА - Player API ==========
  - id: player_api_label
    type: TEXT_BUTTON
    text: "Player API"
    hoveredText: "Демонстрация Player API функций"
    position: [-0.6, 0.9, 0.0]
    scale: [0.3, 0.3, 0.3]
    backgroundColor: [80, 60, 40]
    backgroundAlpha: 150
    onClick:
      action: NONE

  - id: btn_heal
    type: ITEM_BUTTON
    material: GOLDEN_APPLE
    position: [-0.6, 0.7, 0.0]
    scale: [0.12, 0.12, 0.02]
    tooltip: "health() - Восстановить здоровье"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_heal_click"

  - id: btn_gamemode
    type: ITEM_BUTTON
    material: COMMAND_BLOCK
    position: [-0.6, 0.5, 0.0]
    scale: [0.12, 0.12, 0.02]
    tooltip: "gamemode() - Переключить режим игры"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_gamemode_click"

  - id: btn_sound
