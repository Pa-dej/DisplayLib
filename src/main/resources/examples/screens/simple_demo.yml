    position: [-0.6, 0.3, 0.0]
    scale: [0.12, 0.12, 0.02]
    tooltip: "sound() - Воспроизвести звук"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_sound_click"

  - id: btn_command
    type: ITEM_BUTTON
    material: REDSTONE_BLOCK
    position: [-0.6, 0.1, 0.0]
    scale: [0.12, 0.12, 0.02]
    tooltip: "command() - Выполнить команду (только OP)"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_command_click"

