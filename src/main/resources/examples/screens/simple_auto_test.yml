id: simple_auto_test
background:
  color: [100, 50, 150]
  alpha: 180
  scale: [8, 4, 1]
  translation: [0, 0, 0]  # Должно стать [-0.1, 0, 0] автоматически
  text: " "

widgets:
  - id: test_text
    type: TEXT_BUTTON
    text: "Автовыравнивание работает!"
    position: [0, 0, 0]
    scale: [4, 2, 1]
    translation: [0, 0, 0]  # Должно стать [-0.05, 0, 0] автоматически
    backgroundColor: [60, 80, 120]
    backgroundAlpha: 180
    onClick:
      action: NONE

  - id: test_item
    type: ITEM_BUTTON
    material: EMERALD
    position: [0, -0.8, 0]
    scale: [2, 2, 0.1]
    translation: [0, 0, 0]  # Должно стать [-0.025, 0, 0] автоматически
    glowOnHover: true
    tooltip: "ITEM тоже выровнен автоматически"
    onClick:
      action: CLOSE_SCREEN