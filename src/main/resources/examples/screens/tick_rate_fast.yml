id: tick_rate_fast
tick_rate: 1  # Очень быстрое обновление - каждый тик (20 раз в секунду)
background:
  color: [80, 40, 40]
  alpha: 180
  scale: [10, 6, 1]
  translation: [0, -1, 0]
  text: " "

widgets:
  # Заголовок
  - id: title
    type: TEXT_BUTTON
    text: "FAST Update (1 tick)"
    position: [0, 2, 0]
    scale: [0.5, 0.5, 0.5]
    alignment: CENTERED
    backgroundColor: [100, 50, 50]
    backgroundAlpha: 200
    onClick:
      action: NONE

  # Описание
  - id: description
    type: TEXT_BUTTON
    text: "20 updates per second\nVery responsive but uses more CPU"
    position: [0, 1, 0]
    scale: [0.35, 0.35, 0.35]
    alignment: CENTERED
    backgroundColor: [80, 60, 60]
    backgroundAlpha: 150
    onClick:
      action: NONE

  # Кнопка возврата
  - id: btn_back
    type: TEXT_BUTTON
    text: "← Back to Demo"
    position: [0, -1, 0]
    scale: [0.4, 0.4, 0.4]
    alignment: CENTERED
    backgroundColor: [60, 40, 40]
    backgroundAlpha: 150
    hoveredBackgroundColor: [80, 50, 50]
    hoveredBackgroundAlpha: 180
    onClick:
      action: SWITCH_SCREEN
      target: tick_rate_demo