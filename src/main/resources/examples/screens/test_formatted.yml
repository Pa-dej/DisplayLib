id: test_formatted
background:
  color: [40, 40, 40]
  alpha: 150
  scale: [8, 4, 1]
  translation: [0, -0.5, 0]
  text: " "

widgets:
  - id: test_colors
    type: TEXT_BUTTON
    text: [{text: "red", color: "red"}, {text: " "}, {text: "green", color: "green"}, {text: " "}, {text: "blue", color: "blue"}]
    position: [0, 0.5, 0]
    scale: [0.4, 0.4, 0.4]
    alignment: CENTERED
    backgroundColor: [60, 60, 60]
    backgroundAlpha: 150
    onClick:
      action: NONE

  - id: test_styles
    type: TEXT_BUTTON
    text: [{text: "Bold", bold: true}, {text: " "}, {text: "Italic", italic: true}]
    position: [0, 0, 0]
    scale: [0.35, 0.35, 0.35]
    alignment: CENTERED
    backgroundColor: [80, 60, 80]
    backgroundAlpha: 150
    onClick:
      action: NONE

  - id: btn_close
    type: TEXT_BUTTON
    text: "Close"
    position: [0, -0.8, 0]
    scale: [0.4, 0.4, 0.4]
    alignment: CENTERED
    backgroundColor: [100, 50, 50]
    backgroundAlpha: 150
    onClick:
      action: CLOSE_SCREEN