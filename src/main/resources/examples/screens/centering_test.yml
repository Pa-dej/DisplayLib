id: centering_test
background:
  color: [80, 120, 160]
  alpha: 180
  scale: [8, 4, 1]
  position: [0, 0, 0]
  translation: [0, 0, 0]  # Теперь центр в середине!
  text: " "

widgets:
  # Центральная точка для ориентира
  - id: center_point
    type: ITEM_BUTTON
    material: REDSTONE_BLOCK
    position: [0, 0, 0]
    scale: [0.2, 0.2, 0.02]
    translation: [0, 0, 0]
    tooltip: "Центр экрана (0, 0, 0)"
    glowOnHover: true
    onClick:
      action: NONE

  # Информация о центрировании
  - id: info_text
    type: TEXT_BUTTON
    text: "Центр фона теперь в середине!"
    position: [0, 1.0, 0]
    scale: [0.4, 0.4, 0.4]
    translation: [0, 0, 0]
    backgroundColor: [60, 100, 140]
    backgroundAlpha: 200
    onClick:
      action: NONE

  # Кнопка закрытия
  - id: btn_close
    type: TEXT_BUTTON
    text: "⏺"
    hoveredText: "Закрыть"
    position: [0, -1.5, 0]
    scale: [0.6, 0.6, 0.6]
    translation: [0, 0, 0]
    backgroundColor: [80, 20, 20]
    backgroundAlpha: 150
    onClick:
      action: CLOSE_SCREEN