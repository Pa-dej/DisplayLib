# Простейший тест hover анимации
id: "hover_test_simple"
screen_type: PRIVATE
tick_rate: 4

background:
  color: [30, 30, 50]
  alpha: 200
  scale: [8.0, 6.0, 1.0]
  text: "█"

widgets:
  # Простая кнопка с bounce
  - id: "test_bounce"
    type: TEXT_BUTTON
    text: "Test Bounce"
    position: [0.0, 1.0, 0.0]
    scale: [0.25, 0.25, 0.25]
    backgroundColor: [70, 130, 180]
    backgroundAlpha: 180
    hoverAnimation:
      type: PRESET
      preset: BOUNCE
      duration: 10
      intensity: 1.2

  # Простая кнопка с scale
  - id: "test_scale"
    type: TEXT_BUTTON
    text: "Test Scale"
    position: [0.0, 0.0, 0.0]
    scale: [0.25, 0.25, 0.25]
    backgroundColor: [180, 70, 130]
    backgroundAlpha: 180
    hoverAnimation:
      type: SCALE
      duration: 8
      scale: [1.3, 1.3, 1.0]
      easing: EASE_OUT

  # Предмет с анимацией
  - id: "test_item"
    type: ITEM_BUTTON
    material: DIAMOND
    position: [0.0, -1.0, 0.0]
    scale: [0.3, 0.3, 0.3]
    glowOnHover: true
    glowColor: [0, 255, 255]
    hoverAnimation:
      type: PRESET
      preset: SCALE
      duration: 6
      intensity: 1.25

  # Кнопка закрытия
  - id: "close_btn"
    type: TEXT_BUTTON
    text: "Закрыть"
    position: [0.0, -2.0, 0.0]
    scale: [0.2, 0.2, 0.2]
    backgroundColor: [150, 50, 50]
    backgroundAlpha: 180
    onClick:
      action: CLOSE_SCREEN