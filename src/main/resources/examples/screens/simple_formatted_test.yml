id: simple_formatted_test
background:
  color: [30, 30, 30]
  alpha: 150
  scale: [8, 4, 1]
  translation: [0, -0.5, 0]
  text: " "

widgets:
  - id: test_formatted
    type: TEXT_BUTTON
    text: [{text: "red", color: "red"}, {text: " "}, {text: "green", color: "green"}, {text: " "}, {text: "blue", color: "blue"}]
    position: [0, 0, 0]
    scale: [0.4, 0.4, 0.4]
    alignment: CENTERED
    backgroundColor: [100, 100, 100]
    backgroundAlpha: 150
    onClick:
      action: CLOSE_SCREEN