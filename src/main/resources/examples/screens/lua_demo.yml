id: lua_demo
background:
  color: [15, 15, 25]
  alpha: 180
  scale: [16.0, 10.0, 1.0]
  text: " "

scripts:
  file: "lua_demo.lua"

widgets:
  # Заголовок
  - id: title
    type: TEXT_BUTTON
    text: "Lua API Demo"
    hoveredText: "Lua API Demo"
    position: [0.0, 2.0, 0.0]
    scale: [0.8, 0.8, 0.8]
    tolerance: [0.15, 0.08]
    backgroundColor: [50, 50, 80]
    backgroundAlpha: 200
    hoveredBackgroundColor: [60, 60, 90]
    hoveredBackgroundAlpha: 220
    onClick:
      action: NONE

  # Информация об игроке
  - id: player_info
    type: TEXT_BUTTON
    text: "Player Info"
    hoveredText: "Player Info"
    position: [-4.0, 1.2, 0.0]
    scale: [0.4, 0.4, 0.4]
    tolerance: [0.12, 0.06]
    backgroundColor: [40, 40, 40]
    backgroundAlpha: 150
    hoveredBackgroundColor: [60, 60, 60]
    hoveredBackgroundAlpha: 180
    onClick:
      action: NONE

  # Кнопки управления игроком
  - id: btn_heal
    type: ITEM_BUTTON
    material: GOLDEN_APPLE
    position: [-4.0, 0.3, 0.0]
    scale: [0.2, 0.2, 0.2]
    tolerance: [0.1, 0.1]
    tooltip: "Восстановить здоровье"
    glowOnHover: true
    onClick:
      action: RUN_SCRIPT
      function: "btn_heal_click"

  - id: btn_gamemode
