id: main_menu
background:
  color: [20, 30, 50]
  alpha: 180
  scale: [8.0, 6.0, 1.0]
  text: " "

scripts:
  file: "main_menu.lua"

widgets:
  # Заголовок
  - id: title
    type: TEXT_BUTTON
    text: "🎮 DisplayLib Lua API"
    hoveredText: "Выберите API для демонстрации"
    position: [0.0, 1.0, 0.0]
    scale: [0.5, 0.5, 0.5]
    backgroundColor: [60, 80, 120]
    backgroundAlpha: 200
    onClick:
      action: NONE

  # Описание
  - id: description
    type: TEXT_BUTTON
    text: "Выберите API для изучения"
    hoveredText: "Каждый экран демонстрирует отдельный API"
    position: [0.0, 0.7, 0.0]
    scale: [0.35, 0.35, 0.35]
    backgroundColor: [40, 60, 80]
    backgroundAlpha: 150
    onClick:
      action: NONE

  # Верхний ряд API
  - id: btn_player_api
    type: ITEM_BUTTON
    material: PLAYER_HEAD
    position: [-0.5, 0.3, 0.0]
    scale: [0.15, 0.15, 0.02]
    tooltip: "Player API - Управление игроком"
    glowOnHover: true
    onClick:
      action: SWITCH_SCREEN
      target: player_api_demo

  - id: btn_storage_api
    type: ITEM_BUTTON
    material: CHEST
    position: [-0.17, 0.3, 0.0]
    scale: [0.15, 0.15, 0.02]
    tooltip: "Storage API - Хранение данных"
    glowOnHover: true
    onClick:
      action: SWITCH_SCREEN
      target: storage_api_demo

  - id: btn_widget_api
    type: ITEM_BUTTON
    material: ITEM_FRAME
    position: [0.17, 0.3, 0.0]
    scale: [0.15, 0.15, 0.02]
    tooltip: "Widget API - Управление виджетами"
    glowOnHover: true
    onClick:
      action: SWITCH_SCREEN
      target: widget_api_demo

  # Нижний ряд API
  - id: btn_timer_api
    type: ITEM_BUTTON
    material: CLOCK
    position: [-0.33, -0.1, 0.0]
    scale: [0.15, 0.15, 0.02]
    tooltip: "Timer API - Система таймеров"
    glowOnHover: true
    onClick:
      action: SWITCH_SCREEN
      target: timer_api_demo

  - id: btn_screen_api
    type: ITEM_BUTTON
    material: MAP
    position: [0.0, -0.1, 0.0]
    scale: [0.15, 0.15, 0.02]
    tooltip: "Screen API - Управление экранами"
    glowOnHover: true
    onClick:
      action: SWITCH_SCREEN
      target: screen_api_demo

  - id: btn_comprehensive
    type: ITEM_BUTTON
    material: NETHER_STAR
    position: [0.33, -0.1, 0.0]
    scale: [0.15, 0.15, 0.02]
    tooltip: "Comprehensive Demo - Все API вместе"
    glowOnHover: true
    onClick:
      action: SWITCH_SCREEN
      target: simple_demo

  # Тест translation
  - id: btn_translation_test
    type: ITEM_BUTTON
    material: COMPASS
    position: [0.5, 0.3, 0.0]
    scale: [0.15, 0.15, 0.02]
    tooltip: "Translation Test - Тест позиционирования"
    glowOnHover: true
    onClick:
      action: SWITCH_SCREEN
      target: translation_test

  # Тест выравнивания текста
  - id: btn_text_alignment
    type: ITEM_BUTTON
    material: WRITABLE_BOOK
    position: [-0.5, -0.5, 0.0]
    scale: [0.15, 0.15, 0.02]
    tooltip: "Text Alignment - Выравнивание текста"
    glowOnHover: true
    onClick:
      action: SWITCH_SCREEN
      target: text_alignment_demo

  # Тест tick_rate
  - id: btn_tick_rate
    type: ITEM_BUTTON
    material: CLOCK
    position: [0, -0.5, 0.0]
    scale: [0.15, 0.15, 0.02]
    tooltip: "Tick Rate Demo - Частота обновления"
    glowOnHover: true
    onClick:
      action: SWITCH_SCREEN
      target: tick_rate_demo

  # Тест форматированного текста
  - id: btn_formatted_text
    type: ITEM_BUTTON
    material: ENCHANTED_BOOK
    position: [0.5, -0.5, 0.0]
    scale: [0.15, 0.15, 0.02]
    tooltip: "Formatted Text - Форматированный текст"
    glowOnHover: true
    onClick:
      action: SWITCH_SCREEN
      target: formatted_text_demo

  # Кнопка закрытия
  - id: btn_close
    type: TEXT_BUTTON
    text: "⏺"
    hoveredText: "Закрыть меню"
    position: [0.35, 0.95, 0.0]
    scale: [0.6, 0.6, 0.6]
    backgroundAlpha: 0
    hoveredBackgroundAlpha: 50
    onClick:
      action: CLOSE_SCREEN