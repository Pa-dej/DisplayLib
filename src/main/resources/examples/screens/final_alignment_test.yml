id: final_alignment_test
background:
  color: [50, 100, 150]
  alpha: 180
  scale: [8, 4, 1]
  translation: [0, -0.5, 0]  # Автовыравнивание по X + ручное смещение по Y
  text: " "

widgets:
  # ITEM виджет - точные координаты
  - id: item_center
    type: ITEM_BUTTON
    material: EMERALD
    position: [0, 0, 0]
    scale: [1, 1, 1]
    translation: [0, 0, 0]  # Точно [0, 0, 0] - без автовыравнивания
    tooltip: "ITEM: точные координаты [0, 0, 0]"
    glowOnHover: true
    onClick:
      action: NONE

  # TEXT виджет - точные координаты
  - id: text_info
    type: TEXT_BUTTON
    text: "Только фон выравнивается"
    position: [0, 1, 0]
    scale: [0.4, 0.4, 0.4]
    translation: [0, 0, 0]  # Точно [0, 0, 0] - без автовыравнивания
    backgroundColor: [60, 80, 120]
    backgroundAlpha: 180
    onClick:
      action: NONE

  # Кнопка закрытия
  - id: btn_close
    type: TEXT_BUTTON
    text: "Закрыть"
    position: [0, -1.5, 0]
    scale: [0.5, 0.5, 0.5]
    translation: [0, 0, 0]
    backgroundColor: [80, 20, 20]
    backgroundAlpha: 150
    onClick:
      action: CLOSE_SCREEN