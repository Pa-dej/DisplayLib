id: tick_rate_slow
tick_rate: 20  # Медленное обновление - каждые 20 тиков (1 раз в секунду)
background:
  color: [40, 40, 80]
  alpha: 180
  scale: [10, 6, 1]
  translation: [0, -1, 0]
  text: " "

widgets:
  # Заголовок
  - id: title
    type: TEXT_BUTTON
    text: "SLOW Update (20 ticks)"
    position: [0, 2, 0]
    scale: [0.5, 0.5, 0.5]
    alignment: CENTERED
    backgroundColor: [50, 50, 100]
    backgroundAlpha: 200
    onClick:
      action: NONE

  # Описание
  - id: description
    type: TEXT_BUTTON
    text: "1 update per second\nLess responsive but saves CPU"
    position: [0, 1, 0]
    scale: [0.35, 0.35, 0.35]
    alignment: CENTERED
    backgroundColor: [60, 60, 80]
    backgroundAlpha: 150
    onClick:
      action: NONE

  # Кнопка возврата
  - id: btn_back
    type: TEXT_BUTTON
    text: "← Back to Demo"
    position: [0, -1, 0]
    scale: [0.4, 0.4, 0.4]
    alignment: CENTERED
    backgroundColor: [40, 40, 60]
    backgroundAlpha: 150
    hoveredBackgroundColor: [50, 50, 80]
    hoveredBackgroundAlpha: 180
    onClick:
      action: SWITCH_SCREEN
      target: tick_rate_demo